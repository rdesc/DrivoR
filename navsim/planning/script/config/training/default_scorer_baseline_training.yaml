hydra:
  run:
    dir: ${output_dir}
  output_subdir: ${output_dir}/code/hydra
  searchpath:
    - pkg://navsim.planning.script.config.common
  job:
    chdir: False

defaults:
  - default_common
  - default_evaluation
  - default_train_val_test_log_split
  - agent: drivoR_scorer_baseline
  - _self_

split: trainval
cache_path: ${oc.env:NAVSIM_EXP_ROOT}/navsim_cache_nommcv
use_cache_without_dataset: true  # override with false + cache_path=null to run on live data if cache not built
force_cache_computation: false
experiment_name: drivoR_scorer_baseline
seed: 0
train_ckpt_path: null

dataloader:
  params:
    batch_size: 32
    num_workers: 8
    pin_memory: true
    prefetch_factor: 4

trainer:
  params:
    max_epochs: 10
    check_val_every_n_epoch: 1
    val_check_interval: 1.0
    limit_train_batches: 1.0
    limit_val_batches: 1.0
    accelerator: gpu
    strategy: ddp
    precision: 16-mixed
    num_nodes: 1
    num_sanity_val_steps: 0
    fast_dev_run: false
    accumulate_grad_batches: 1
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
    default_root_dir: ${output_dir}
